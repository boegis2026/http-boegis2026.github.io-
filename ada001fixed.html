<!DOCTYPE html>

<html lang="en">
<head>
    <title>City Services</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: white;
            color: #222;
            margin: 20px;
        }

    .header {
        font-size: 36px;
        font-weight: bold;
        color: #333;
    }

    nav a {
        margin-right: 20px;
    }

    .small-text {
        font-size: 14px;
    }

    button {
        background: #e0e0e0;
        color: #222;
        padding: 8px 12px;
        border: 1px solid #555;
        cursor: pointer;
    }

    input {
        margin-bottom: 10px;
    }

    label {
        display: block;
        margin-top: 8px;
    }

    .error-message {
        color: #b00020;
        font-weight: bold;
        margin-bottom: 10px;
    }
    
    form {
    display: inline-block;
    text-align: left;
    }

    .form-row {
        display: grid;
        grid-template-columns: 140px 300px;
        align-items: center;
        margin-bottom: 10px;
    }

    .form-row input {
        width: 100%;
    }

</style>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

</head>

<body>
<div class="container text-center">

<header>
    <h1 class="header">City Services Portal</h1>

    <nav aria-label="Main navigation">
        <a href="#services">Services</a>
        <a href="#contact">Contact</a>
        <a href="#apply">Apply</a>
    </nav>
</header>

<main>
    <section aria-labelledby="services">
        <h2 id="services">Available Services</h2>

        <p class="small-text">Use this page to apply for permits, report issues, and contact the city.</p>

        <img src="floorplan.jpg" width="500" height="180" alt="Floor plan drawing for a building permit application">

        <p>
            <a href="https://lacity.gov/myla311">Learn more about city programs</a>.
        </p>
    </section>

    <section aria-labelledby="apply">
        <h2 id="apply">Application Form</h2>

        <form>
            <div class="form-row">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" autocomplete="name">
            </div>

            <div class="form-row">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email">
            </div>

            <div class="form-row">
            <label for="permit-number">Permit Number</label>
            <input id="permit-number" name="permit-number" type="text" aria-describedby="permit-error">
            </div>

            <div id="permit-error" class="error-message">Permit number is required.</div>

            <button type="button" onclick="alert('Submitted')">Submit Application</button>
        </form>
    </section>

    <section aria-labelledby="contact">
        <h2 id="contact">Contact</h2>
        <p>Phone: 555-555-5555</p>
    </section>
</main>

</div>
</body>
</html>
